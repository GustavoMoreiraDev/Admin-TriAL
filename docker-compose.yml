x-backend-env: &backend-env
  APP_NAME: ${APP_NAME}
  APP_ENV: ${APP_ENV}
  APP_DEBUG: ${APP_DEBUG}
  APP_TIMEZONE: ${APP_TIMEZONE}
  APP_URL: ${APP_URL}
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: 5432
  DB_DATABASE: ${DB_DATABASE}
  DB_USERNAME: ${DB_USERNAME}
  DB_PASSWORD: ${DB_PASSWORD}
  JWT_SECRET: ${JWT_SECRET}
  JWT_ALGO: ${JWT_ALGO}
  JWT_TTL: ${JWT_TTL}
  JWT_REFRESH_TTL: ${JWT_REFRESH_TTL}
  QUEUE_CONNECTION: ${QUEUE_CONNECTION}
  MAIL_MAILER: ${MAIL_MAILER}
  MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
  MAIL_FROM_NAME: ${MAIL_FROM_NAME}
  ROOT_EMAIL: ${ROOT_EMAIL}
  ROOT_SENHA: ${ROOT_SENHA}
  ROOT_NOME: ${ROOT_NOME}
  ROOT_TELEFONE: ${ROOT_TELEFONE}
  ROOT_NASCIMENTO: ${ROOT_NASCIMENTO}
  LOG_CHANNEL: stack
  LOG_STACK: single
  LOG_LEVEL: debug
  APP_LOCALE: pt_BR
  APP_FALLBACK_LOCALE: pt_BR
  CACHE_STORE: file
  SESSION_DRIVER: file

services:
  postgres:
    image: postgres:16-alpine
    container_name: trial_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - trial_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend: &backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trial_backend
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - backend_vendor:/var/www/vendor
      - ./.env:/tmp/host.env
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - trial_network

  worker:
    <<: *backend
    container_name: trial_worker
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--timeout=60"]
    environment:
      <<: *backend-env
      SKIP_SETUP: "true"
    depends_on:
      postgres:
        condition: service_healthy

  scheduler:
    <<: *backend
    container_name: trial_scheduler
    command: ["php", "artisan", "schedule:work"]
    environment:
      <<: *backend-env
      SKIP_SETUP: "true"
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    container_name: trial_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - trial_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trial_frontend
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_URL: ${VITE_API_URL}
    networks:
      - trial_network

volumes:
  postgres_data:
  backend_vendor:
  frontend_node_modules:

networks:
  trial_network:
    driver: bridge
